name: Patch and Tag

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:        # Also triggerable manually from the Actions tab

permissions:
  contents: write   # push tags
  issues: write     # create / edit / close the failure issue

jobs:
  patch-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all local branches (patch branches live here too)
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: Run patch-tags script
        id: patch
        run: bash scripts/patch-tags.sh 2>&1 | tee /tmp/patch-output.txt
        continue-on-error: true

      - name: Push updated tags
        # Push even on partial failure so successfully-built tags are published.
        run: |
          git push origin 'refs/tags/*:refs/tags/*' --force

      - name: Ensure patch-conflict label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create patch-conflict \
            --color e11d48 \
            --description "One or more upstream tags could not be patched" \
            2>/dev/null || true

      - name: Manage failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect any failed tags from the script output.
          FAILED=$(grep '^FAIL ' /tmp/patch-output.txt | awk '{print $2}' || true)

          # Find an existing open issue for patch failures (if any).
          ISSUE_NUMBER=$(gh issue list \
            --label patch-conflict \
            --state open \
            --json number \
            --jq '.[0].number' \
            2>/dev/null || echo "")

          if [[ -z "$FAILED" ]]; then
            # Everything succeeded: close any open failure issue.
            if [[ -n "$ISSUE_NUMBER" ]]; then
              gh issue close "$ISSUE_NUMBER" \
                --comment "All patch merges succeeded — closing automatically."
              echo "Closed issue #${ISSUE_NUMBER}"
            fi
          else
            # Build the issue body.
            {
              echo "The following upstream release tags could not be built because"
              echo "a patch branch conflicted with changes in that release:"
              echo ""
              while IFS= read -r t; do
                echo "- \`${t}\`"
              done <<< "$FAILED"
              echo ""
              echo "Update the relevant \`patches/v*/\` branch(es) to resolve the"
              echo "conflicts, then re-run the **Patch and Tag** workflow."
              echo ""
              echo "*(This issue is updated in place on each run.)*"
            } > /tmp/issue-body.md

            if [[ -n "$ISSUE_NUMBER" ]]; then
              gh issue edit "$ISSUE_NUMBER" --body-file /tmp/issue-body.md
              echo "Updated issue #${ISSUE_NUMBER}"
            else
              gh issue create \
                --title "Patch merge failures" \
                --label patch-conflict \
                --body-file /tmp/issue-body.md
              echo "Created new failure issue"
            fi
          fi

      - name: Fail the workflow if patches failed
        if: steps.patch.outcome == 'failure'
        run: exit 1
